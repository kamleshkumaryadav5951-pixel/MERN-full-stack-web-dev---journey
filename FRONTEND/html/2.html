<!DOCTYPE html>
<html>
<head>
    <title>My CSS Program</title>

    <style>
        /* Styling the body */
        body {
            background-color: lightgray;
            font-family: Arial;
            text-align: center;
        }

        /* Styling heading */
        h1 {
            color: blue;
        }

        /* Styling a box */
        .box {
            background-color: white;
            border: 2px solid black;
            padding: 20px;
            margin: 20px;
            width: 300px;
            margin-left: auto;
            margin-right: auto;
        }

        /* Styling button */
        button {
            background-color: green;
            color: white;
            padding: 10px;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background-color: darkgreen;
        }
    </style>
</head>

<body>

    <h1>Welcome Kamlesh</h1>

    <div class="box">
        <p>This is a styled box using CSS.</p>
        <button>Click Me</button>
    </div>

</body>
</html>
